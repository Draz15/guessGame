<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/style.css">
    <title>guess Game</title>
</head>
<body>
    <h1></h1>
    <div class="guess-game">
        <div class="game-area">
         <div class="inputs"></div>
         <div class="control">
            <button class="check">check word</button>
            <button class="hint"><span></span> Hint</button>
         </div>
         <div class="message"></div>
        </div>
        <div class="key-colors">
            <h2>Key Colors</h2>
            <div class="key-color">
                <div class="key in-place"></div>
                <div class="key-text">Letter Is Correct And In Place</div>
            </div>
            <div class="key-color">
                <div class="key not-in-place"></div>
                <div class="key-text">Letter Is Correct But Not In Place</div>
            </div>
            <div class="key-color">
                <div class="key not"></div>
                <div class="key-text">Letter Is Wrong</div>
            </div>
            <div class="startContainer">
                <button class="change-btn">New Game</button>
                <button class="restart-btn">Restart <i class="fa-solid fa-rotate-left"></i></button>
            </div>
        </div>
    </div>
<footer></footer>
    <script type="module" src="js/main.js"></script>
</body>
</html>
